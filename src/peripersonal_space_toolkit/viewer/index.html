<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PPS Trajectory Viewer</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #11100e;
      color: #f2e7d8;
      font-family: Arial, Helvetica, sans-serif;
    }
    #viewer {
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      left: 14px;
      top: 12px;
      padding: 8px 10px;
      border: 1px solid rgba(242, 231, 216, 0.18);
      background: rgba(17, 16, 14, 0.58);
      border-radius: 6px;
      line-height: 1.35;
      font-size: 12px;
      pointer-events: none;
    }
    #hud strong {
      display: block;
      margin-bottom: 2px;
      font-size: 13px;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three/three.module.js",
        "three/addons/controls/OrbitControls.js": "./vendor/three/OrbitControls.js"
      }
    }
  </script>
</head>
<body>
  <div id="viewer" data-viewer-ready="false"></div>
  <div id="hud">
    <strong>3D Sound Path</strong>
    <span id="viewer-status">Loading...</span>
  </div>
  <script type="module" src="./trajectory-viewer.js"></script>
</body>
</html>
